<script>

const META_FIELDS = [
  { key:"bolum", label:"BÖLÜM" },

  { key:"sayfa", label:"SAYFA" },
  { key:"mekan", label:"MEKAN" },
];

const FF = "'IBM Plex Mono','Courier New',monospace";


function splitScreenplay(text) {
  if (!text) return [];
  // Match scene headers: lines starting with number + dot/dash + location
  const headerRe = /^[ \t]*(\d+[A-Za-z]?[ \t]*[.\-\u2014][ \t]*(?:I\u00c7|DI\u015e|INT|EXT|FLASH|FB|\u0130\u00c7|DI\u015e|K\u00dc1|K\u00dc|[A-Z\u011e\u0130\u015e\u00dc\u00d6\u00c7][A-Z\u011e\u0130\u015e\u00dc\u00d6\u00c7\s]*)[^\n]*)/im;
  const lines = text.split("\n");
  const scenes = [];
  let cur = [];
  for (const line of lines) {
    const trimmed = line.trim();
    // detect scene header: starts with digits, optionally letter, then . or - then content
    if (/^\d+[A-Za-z]?\s*[.\-\u2014]\s*.{3,}/.test(trimmed) && trimmed.length < 120) {
      if (cur.length > 0) scenes.push(cur.join("\n").trim());
      cur = [line];
    } else {
      cur.push(line);
    }
  }
  if (cur.length > 0) scenes.push(cur.join("\n").trim());
  return scenes.length ? scenes : [text];
}

function buildSegments(text, scene, activeItem) {
  if (!text || !scene) return [{ text, color: null }];
  let anns = [];
  DEPTS.forEach(dept => {
    (scene[dept.key] || []).forEach(item => {
      const clean = item.replace(/\s*\?$/, "").replace(/\s+D:\d+[\+\w\s\[\]]*$/, "").replace(/\s*\(O\.S\.\)\??$/, "").trim();
      if (clean.length < 2) return;
      const lower = text.toLowerCase(), lc = clean.toLowerCase();
      let idx = 0;
      while (idx < text.length) {
        const f = lower.indexOf(lc, idx);
        if (f === -1) break;
        const isActive = !!(activeItem && activeItem.item === item && activeItem.deptKey === dept.key);
        anns.push({ start: f, end: f + clean.length, color: dept.color, bg: dept.bg, deptKey: dept.key, item, isActive });
        idx = f + 1;
      }
    });
  });
  if (!anns.length) return [{ text, color: null }];
  anns.sort((a, b) => a.start - b.start);
  let segs = [], pos = 0;
  for (const a of anns) {
    if (a.start < pos) continue;
    if (a.start > pos) segs.push({ text: text.slice(pos, a.start), color: null });
    segs.push({ text: text.slice(a.start, a.end), color: a.color, bg: a.bg, isActive: a.isActive, deptKey: a.deptKey, item: a.item });
    pos = a.end;
  }
  if (pos < text.length) segs.push({ text: text.slice(pos), color: null });
  return segs;
}

function Logo() {
  return h("div", { style: { width: 28, height: 28, background: "linear-gradient(135deg,#c9963a,#f0c060)", borderRadius: 3, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: "bold", color: "#0b0d14", fontFamily: "serif", flexShrink: 0 } }, "C");
}

function App() {
  const [screen, setScreen] = useState("input");
  const [screenplay, setScreenplay] = useState("");
  const [anacast, setAnacast] = useState("");
  const [loading, setLoading] = useState(false);
  const [scenes, setScenes] = useState([]);
  const [selIdx, setSelIdx] = useState(0);
  const [activeItem, setActiveItem] = useState(null);
  const [popup, setPopup] = useState(null);
  const [addingTo, setAddingTo] = useState(null);
  const [addInput, setAddInput] = useState("");
  const [error, setError] = useState("");
  const [expandedDepts, setExpandedDepts] = useState({});
  const activeRef = useRef(null);

  useEffect(() => {
    if (activeRef.current) activeRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
  }, [activeItem]);

  const scene = scenes[selIdx] || null;

  async function runBreakdown() {
    if (!screenplay.trim()) return;
    setLoading(true); setError("");
    const controller = new AbortController();
    const timeoutId = setTimeout(() => { controller.abort(); }, 90000);
    const jsonInstr = '\n\nÇıktını SADECE geçerli JSON olarak ver. Kod bloğu veya açıklama ekleme:\n{"scenes":[{"sahne":"1","bolum":"","gun":"1","zaman":"İÇ/GECE","sayfa":"1","mekan":"MEKAN","oyuncular":[],"yrd_oyuncular":[],"sac":[],"makyaj":[],"kostum":[],"sanat":[],"araclar":[],"produksiyon":[],"teknik":[],"cgi_vfx":[],"sfx":[],"sound_design":[],"reji_notlar":[],"aciklama":"","notlar":"","aciklama":"","notlar":""}]}';
    const userPrompt = (anacast.trim() ? "AnaCast Beyaz Listesi:\n" + anacast.trim() + "\n\n---\n\n" : "") + "SENARYO:\n" + screenplay.trim() + jsonInstr;
    try {
      const res = await fetch("/breakdown", {
        method: "POST", signal: controller.signal,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ senaryo: screenplay.trim(), anacast: anacast.trim() })
      });
      clearTimeout(timeoutId);
      if (!res.ok) { const errText = await res.text(); throw new Error("HTTP " + res.status + ": " + errText.slice(0, 200)); }
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const parsed = data;
      // Client-side: attach screenplay text to each scene
      const rawScenes = splitScreenplay(screenplay);
      const mergedScenes = (parsed.scenes || []).map((sc, i) => ({
        ...sc,
        screenplay_text: rawScenes[i] || rawScenes[Math.min(i, rawScenes.length-1)] || ""
      }));
      setScenes(mergedScenes); setSelIdx(0); setExpandedDepts({}); setScreen("viewer");
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }

  function handleMouseUp() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) { setPopup(null); return; }
    const text = sel.toString().trim();
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    setPopup({ text, x: rect.left + rect.width / 2, y: rect.top - 8 });
  }

  function assignToScene(deptKey) {
    if (!popup) return;
    setScenes(prev => prev.map((sc, i) => {
      if (i !== selIdx) return sc;
      const ex = sc[deptKey] || [];
      if (ex.includes(popup.text)) return sc;
      return { ...sc, [deptKey]: [...ex, popup.text] };
    }));
    setPopup(null); window.getSelection()?.removeAllRanges();
  }

  function removeItem(deptKey, item) {
    setScenes(prev => prev.map((sc, i) => i !== selIdx ? sc : { ...sc, [deptKey]: (sc[deptKey] || []).filter(x => x !== item) }));
    if (activeItem && activeItem.item === item) setActiveItem(null);
  }

  function addItem(deptKey) {
    if (!addInput.trim()) return;
    setScenes(prev => prev.map((sc, i) => {
      if (i !== selIdx) return sc;
      const ex = sc[deptKey] || [];
      if (ex.includes(addInput.trim())) return sc;
      return { ...sc, [deptKey]: [...ex, addInput.trim()] };
    }));
    setAddInput(""); setAddingTo(null);
  }

  function updateMeta(key, val) {
    setScenes(prev => prev.map((sc, i) => i !== selIdx ? sc : { ...sc, [key]: val }));
  }

  // ---- INPUT SCREEN ----
  if (screen === "input") {
    return h("div", { style: { height: "100vh", background: "#080a0e", color: "#d8dce8", fontFamily: FF, display: "flex", flexDirection: "column" } },
      // Header
      h("div", { style: { borderBottom: "1px solid #1e2230", padding: "14px 24px", display: "flex", alignItems: "center", gap: 12, background: "#0b0d14" } },
        h(Logo, null),
        h("div", null,
          h("div", { style: { fontSize: 13, fontWeight: 700, letterSpacing: "0.1em", color: "#f0c060", textTransform: "uppercase" } }, "CerenSafe"),
          h("div", { style: { fontSize: 9, color: "#4a5070" } }, "Universal v10.77 · Interactive Breakdown Studio")
        )
      ),
      // Body
      h("div", { style: { display: "flex", flex: 1, minHeight: 0 } },
        // Left inputs
        h("div", { style: { width: 300, flexShrink: 0, borderRight: "1px solid #1a1e2c", display: "flex", flexDirection: "column", background: "#090b11", padding: 20 } },
          h("label", { style: { fontSize: 9, letterSpacing: "0.12em", color: "#c9963a", textTransform: "uppercase", display: "block", marginBottom: 6 } }, "AnaCast Listesi"),
          h("textarea", { value: anacast, onChange: e => setAnacast(e.target.value), placeholder: "ALİ\nMERYEM\nHALİL", style: { height: 80, background: "#0e1018", border: "1px solid #1e2230", borderRadius: 4, color: "#8090c0", fontSize: 11, padding: "8px 10px", resize: "none", outline: "none", fontFamily: FF, lineHeight: 1.6, marginBottom: 14 } }),
          h("label", { style: { fontSize: 9, letterSpacing: "0.12em", color: "#c9963a", textTransform: "uppercase", display: "block", marginBottom: 6 } }, "Senaryo"),
          h("textarea", { value: screenplay, onChange: e => setScreenplay(e.target.value), placeholder: "1. İÇ/GECE — KAHVE\n\nALİ masaya oturur.\n\n2. DIŞ/GÜN — SOKAK\n\nMERYEM döner...", style: { flex: 1, background: "#0e1018", border: "1px solid #1e2230", borderRadius: 4, color: "#c8d0e8", fontSize: 11, padding: 10, resize: "none", outline: "none", fontFamily: FF, lineHeight: 1.7, marginBottom: 14 } }),
          h("button", { onClick: runBreakdown, disabled: loading || !screenplay.trim(), style: { padding: 12, background: loading || !screenplay.trim() ? "#1a1e2c" : "linear-gradient(135deg,#c9963a,#e8b050)", border: "none", borderRadius: 4, color: loading || !screenplay.trim() ? "#3a4060" : "#080a0e", fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", cursor: loading || !screenplay.trim() ? "not-allowed" : "pointer", fontFamily: FF } },
            loading ? "Analiz ediliyor..." : "Breakdown Al"
          ),
          error ? h("div", { style: { marginTop: 8, fontSize: 10, color: "#e06060", padding: "6px 8px", background: "#1a0e0e", borderRadius: 3, wordBreak: "break-word" } }, error) : null
        ),
        // Right empty state
        h("div", { style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 } },
          h("div", { style: { fontSize: 48, color: "#1a1e2c" } }, "◎"),
          h("div", { style: { fontSize: 11, color: "#3a4060", textAlign: "center", lineHeight: 2 } }, "Senaryo girin → Breakdown Al"),
          h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, maxWidth: 420, justifyContent: "center", marginTop: 8 } },
            DEPTS.map(d => h("span", { key: d.key, style: { fontSize: 8, color: d.color, background: d.bg, padding: "2px 8px", borderRadius: 10 } }, d.label))
          )
        )
      )
    );
  }

  // ---- VIEWER SCREEN ----
  const segs = scene ? buildSegments(scene.screenplay_text || "", scene, activeItem) : [];

  return h("div", { style: { height: "100vh", background: "#080a0e", color: "#d8dce8", fontFamily: FF, display: "flex", flexDirection: "column", overflow: "hidden" }, onClick: () => setPopup(null) },

    // Header
    h("div", { style: { borderBottom: "1px solid #1e2230", padding: "8px 16px", display: "flex", alignItems: "center", gap: 10, background: "#0b0d14", flexShrink: 0, height: 42 } },
      h(Logo, null),
      h("span", { style: { fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: "#f0c060" } }, "CERENSAFE"),
      h("span", { style: { fontSize: 8, color: "#3a4060" } }, "v10.77"),
      h("span", { style: { fontSize: 9, color: "#4a5070", marginLeft: 8 } }, scenes.length + " sahne"),
      h("div", { style: { marginLeft: "auto" } },
        h("button", { onClick: () => { setScreen("input"); setScenes([]); }, style: { padding: "3px 10px", background: "transparent", border: "1px solid #2a3040", borderRadius: 3, color: "#6070a0", fontSize: 9, cursor: "pointer", fontFamily: FF, letterSpacing: "0.06em" } }, "← Yeni")
      )
    ),

    // Main 3-column layout
    h("div", { style: { display: "flex", flex: 1, minHeight: 0, overflow: "hidden" } },

      // --- COLUMN 1: Scene List ---
      h("div", { style: { width: 190, flexShrink: 0, borderRight: "1px solid #1a1e2c", overflowY: "auto", background: "#090b11" } },
        h("div", { style: { padding: "8px 12px", fontSize: 8, color: "#4a5070", letterSpacing: "0.1em", textTransform: "uppercase", borderBottom: "1px solid #111318", position: "sticky", top: 0, background: "#090b11", zIndex: 2 } }, "SAHNELER"),
        scenes.map((sc, i) =>
          h("div", { key: i, onClick: () => { setSelIdx(i); setActiveItem(null); setPopup(null); }, style: { padding: "9px 12px", cursor: "pointer", borderBottom: "1px solid #0e1018", background: i === selIdx ? "#141820" : "transparent", borderLeft: i === selIdx ? "3px solid #c9963a" : "3px solid transparent" } },
            h("div", { style: { fontSize: 10, fontWeight: 700, color: i === selIdx ? "#f0c060" : "#8090b0" } }, sc.sahne || (i + 1)),
            h("div", { style: { fontSize: 8, color: "#4a5070", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, sc.mekan || "—"),
            h("div", { style: { fontSize: 8, color: "#3a4060", marginTop: 1 } }, sc.zaman || "—"),
            h("div", { style: { display: "flex", gap: 2, marginTop: 4, flexWrap: "wrap" } },
              DEPTS.filter(d => (sc[d.key] || []).length > 0).slice(0, 6).map(d =>
                h("div", { key: d.key, title: d.label, style: { width: 6, height: 6, borderRadius: "50%", background: d.color, opacity: 0.8 } })
              )
            )
          )
        )
      ),

      // --- COLUMN 2: Breakdown Panel ---
      h("div", { style: { width: 300, flexShrink: 0, borderRight: "1px solid #1a1e2c", overflowY: "auto", background: "#0a0c13" } },
        scene ? [
          // Meta fields
          h("div", { key: "meta", style: { padding: "10px 14px", borderBottom: "1px solid #111318", background: "#0b0d14" } },
            h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 } },
              META_FIELDS.map(f =>
                h("div", { key: f.key },
                  h("div", { style: { fontSize: 7, color: "#c9963a", letterSpacing: "0.1em", marginBottom: 2 } }, f.label),
                  h("input", { value: scene[f.key] || "", onChange: e => updateMeta(f.key, e.target.value), style: { width: "100%", background: "#0e1018", border: "1px solid #1e2230", borderRadius: 3, color: "#c8d0e8", fontSize: 9, padding: "3px 7px", outline: "none", fontFamily: FF } })
                )
              )
            ),
            h("div", { style: { marginTop: 7 } },
              h("div", { style: { fontSize: 7, color: "#94a3b8", letterSpacing: "0.1em", marginBottom: 2 } }, "AÇIKLAMA"),
              h("textarea", { value: scene.aciklama || "", onChange: e => updateMeta("aciklama", e.target.value), style: { width: "100%", height: 46, background: "#0e1018", border: "1px solid #1e2230", borderRadius: 3, color: "#9aabb8", fontSize: 9, padding: "4px 7px", resize: "none", outline: "none", fontFamily: FF, lineHeight: 1.5 } })
            )
          ),
          // Dept sections
          ...DEPTS.map(dept => {
            const items = scene[dept.key] || [];
            const exp = expandedDepts[dept.key] !== false;
            return h("div", { key: dept.key, style: { borderBottom: "1px solid #0e1018" } },
              // Dept header
              h("div", { onClick: () => setExpandedDepts(p => ({ ...p, [dept.key]: !exp })), style: { padding: "7px 12px", display: "flex", alignItems: "center", gap: 7, cursor: "pointer", background: "#0a0c13", userSelect: "none" } },
                h("div", { style: { width: 7, height: 7, borderRadius: "50%", background: dept.color, flexShrink: 0 } }),
                h("span", { style: { fontSize: 8, fontWeight: 700, letterSpacing: "0.1em", color: dept.color, flex: 1 } }, dept.label),
                items.length > 0 ? h("span", { style: { fontSize: 8, background: dept.bg, color: dept.color, padding: "1px 5px", borderRadius: 8 } }, items.length) : null,
                h("span", { style: { fontSize: 8, color: "#3a4060" } }, exp ? "▲" : "▼")
              ),
              // Dept body
              exp ? h("div", { style: { padding: "5px 12px 8px", background: "#090b11" } },
                ...items.map((item, ii) => {
                  const isAct = !!(activeItem && activeItem.item === item && activeItem.deptKey === dept.key);
                  return h("div", { key: ii, onClick: () => setActiveItem(a => a && a.item === item && a.deptKey === dept.key ? null : { item, deptKey: dept.key }), style: { display: "flex", alignItems: "center", gap: 5, padding: "3px 5px", marginBottom: 2, borderRadius: 3, cursor: "pointer", background: isAct ? dept.bg : "transparent", border: "1px solid " + (isAct ? dept.color + "50" : "transparent") } },
                    h("span", { style: { flex: 1, fontSize: 9, color: isAct ? dept.color : "#a0b0c0", lineHeight: 1.4 } }, item),
                    h("button", { onClick: e => { e.stopPropagation(); removeItem(dept.key, item); }, style: { background: "none", border: "none", color: "#3a4060", cursor: "pointer", fontSize: 12, padding: "0 2px", lineHeight: 1 } }, "×")
                  );
                }),
                addingTo === dept.key
                  ? h("div", { style: { display: "flex", gap: 3, marginTop: 3 } },
                    h("input", { autoFocus: true, value: addInput, onChange: e => setAddInput(e.target.value), onKeyDown: e => { if (e.key === "Enter") addItem(dept.key); if (e.key === "Escape") { setAddingTo(null); setAddInput(""); } }, style: { flex: 1, background: "#0e1018", border: "1px solid " + dept.color + "60", borderRadius: 3, color: "#c8d0e8", fontSize: 9, padding: "3px 7px", outline: "none", fontFamily: FF }, placeholder: "Yazın → Enter" }),
                    h("button", { onClick: () => addItem(dept.key), style: { background: dept.bg, border: "1px solid " + dept.color + "60", borderRadius: 3, color: dept.color, fontSize: 9, padding: "3px 8px", cursor: "pointer" } }, "+")
                  )
                  : h("button", { onClick: () => { setAddingTo(dept.key); setAddInput(""); }, style: { marginTop: 3, padding: "2px 8px", background: "transparent", border: "1px dashed #1e2230", borderRadius: 3, color: "#4a5070", fontSize: 8, cursor: "pointer", fontFamily: FF, width: "100%", textAlign: "left" } }, "+ Ekle")
              ) : null
            );
          })
        ] : null
      ),

      // --- COLUMN 3: Screenplay ---
      h("div", { style: { flex: 1, overflowY: "auto", padding: "20px 24px", background: "#0c0e16", position: "relative" }, onMouseUp: handleMouseUp },
        // Legend
        h("div", { style: { display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 16, padding: "8px 12px", background: "#0b0d14", borderRadius: 4, border: "1px solid #1a1e2c" } },
          scene && DEPTS.filter(d => (scene[d.key] || []).length > 0).length > 0
            ? DEPTS.filter(d => scene && (scene[d.key] || []).length > 0).map(d =>
              h("div", { key: d.key, style: { display: "flex", alignItems: "center", gap: 3 } },
                h("div", { style: { width: 7, height: 7, borderRadius: 2, background: d.color } }),
                h("span", { style: { fontSize: 7, color: d.color } }, d.label)
              )
            )
            : h("span", { style: { fontSize: 8, color: "#3a4060" } }, "Metinden seçerek departman atayabilirsiniz")
        ),
        // Text with highlights
        h("div", { style: { fontSize: 12, lineHeight: 1.9, color: "#c8d0e8", fontFamily: "'Courier New',monospace", whiteSpace: "pre-wrap", cursor: "text", userSelect: "text" } },
          segs.map((seg, i) => {
            if (!seg.color) return h("span", { key: i }, seg.text);
            const isAct = !!(activeItem && activeItem.item === seg.item && activeItem.deptKey === seg.deptKey);
            return h("span", {
              key: i,
              ref: isAct ? activeRef : null,
              onClick: e => { e.stopPropagation(); setActiveItem(a => a && a.item === seg.item && a.deptKey === seg.deptKey ? null : { item: seg.item, deptKey: seg.deptKey }); },
              style: { background: isAct ? seg.color + "55" : seg.color + "22", color: isAct ? seg.color : seg.color + "cc", borderRadius: 2, padding: "0 2px", outline: isAct ? "2px solid " + seg.color + "70" : "none", cursor: "pointer" }
            }, seg.text);
          })
        ),
        // Selection popup
        popup ? h("div", { onClick: e => e.stopPropagation(), style: { position: "fixed", left: Math.max(10, Math.min(popup.x - 120, window.innerWidth - 260)), top: Math.max(10, popup.y - 220), width: 240, background: "#0f1120", border: "1px solid #2a3040", borderRadius: 6, boxShadow: "0 8px 32px rgba(0,0,0,0.7)", zIndex: 1000, overflow: "hidden" } },
          h("div", { style: { padding: "7px 12px", borderBottom: "1px solid #1a1e2c", fontSize: 8, color: "#8090b0", letterSpacing: "0.08em", textTransform: "uppercase" } }, "Departmana ata:"),
          h("div", { style: { padding: "4px 0", maxHeight: 220, overflowY: "auto" } },
            h("div", { style: { padding: "3px 12px 4px", fontSize: 8, color: "#3a4060", fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, '"' + (popup.text.length > 30 ? popup.text.slice(0, 30) + "..." : popup.text) + '"'),
            DEPTS.map(d =>
              h("div", { key: d.key, onClick: () => assignToScene(d.key), style: { padding: "6px 12px", display: "flex", alignItems: "center", gap: 7, cursor: "pointer" }, onMouseEnter: e => e.currentTarget.style.background = d.bg, onMouseLeave: e => e.currentTarget.style.background = "transparent" },
                h("div", { style: { width: 7, height: 7, borderRadius: "50%", background: d.color, flexShrink: 0 } }),
                h("span", { style: { fontSize: 10, color: "#a0b0c0" } }, d.label)
              )
            )
          )
        ) : null,
        h("div", { style: { marginTop: 24, fontSize: 8, color: "#1e2230", borderTop: "1px solid #0e1018", paddingTop: 10 } }, "Metni seç → departman ata  ·  Highlight tıkla → vurgula  ·  × kaldır / + ekle")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
</script>
</body>
</html>
