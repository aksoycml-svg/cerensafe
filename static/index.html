<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CerenSafe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { background: #0d0f1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; overflow: hidden; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #252840; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #3a3d5c; }

input, textarea, button { font-family: inherit; }
textarea, input { outline: none; }

/* ---- Layout ---- */
.app { height: 100vh; display: flex; flex-direction: column; }

.topbar {
  height: 46px; flex-shrink: 0;
  background: #0a0c16; border-bottom: 1px solid #181b2e;
  display: flex; align-items: center; padding: 0 18px; gap: 10px;
}
.topbar-divider { width: 1px; height: 18px; background: #1e2235; margin: 0 4px; }
.topbar-title { font-size: 14px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.01em; }
.topbar-sub { font-size: 11px; color: #3d4266; }
.topbar-count { font-size: 11px; color: #4a5080; }
.topbar-actions { margin-left: auto; }

.btn-ghost {
  padding: 5px 14px; background: transparent;
  border: 1px solid #252840; border-radius: 6px;
  color: #6b7280; font-size: 11px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-ghost:hover { border-color: #3a3d5c; color: #9ca3af; }

/* ---- Input Screen ---- */
.input-screen { flex: 1; display: flex; min-height: 0; }
.input-sidebar {
  width: 260px; flex-shrink: 0;
  background: #0a0c16; border-right: 1px solid #181b2e;
  padding: 24px 20px; display: flex; flex-direction: column; gap: 18px;
}
.input-main { flex: 1; display: flex; flex-direction: column; padding: 24px; gap: 10px; }

.field-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: #6366f1; display: block; margin-bottom: 5px;
}
.textarea-base {
  width: 100%; background: #12152a; border: 1px solid #1e2235;
  border-radius: 8px; color: #e2e8f0; resize: none;
  padding: 10px 13px; line-height: 1.75;
  transition: border-color 0.15s;
}
.textarea-base:focus { border-color: #6366f1; }
.anacast-ta { height: 96px; font-size: 12px; color: #94a3b8; }
.screenplay-ta { flex: 1; font-size: 13px; font-family: 'Courier New', monospace; }

.btn-primary {
  padding: 11px 0; background: #6366f1; color: #fff;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; width: 100%; letter-spacing: 0.01em;
  transition: background 0.15s; position: relative;
}
.btn-primary:hover:not(:disabled) { background: #5254cc; }
.btn-primary:disabled { background: #1e2235; color: #3a3d5c; cursor: not-allowed; }

.error-box {
  font-size: 11px; color: #f87171; background: #2d0a0a;
  border: 1px solid #7f1d1d; padding: 9px 13px;
  border-radius: 7px; line-height: 1.55;
}

.dept-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.dept-pill-mini {
  font-size: 10px; padding: 2px 9px; border-radius: 999px;
  border: 1px solid transparent;
}

/* ---- Viewer Screen ---- */
.viewer-body { flex: 1; display: flex; min-height: 0; overflow: hidden; }

/* Col 1 — Scene List */
.col-scenes {
  width: 200px; flex-shrink: 0;
  background: #0a0c16; border-right: 1px solid #181b2e;
  display: flex; flex-direction: column; overflow: hidden;
}
.col-header {
  padding: 9px 14px; font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: #3d4266;
  border-bottom: 1px solid #181b2e; flex-shrink: 0;
}
.scenes-list { overflow-y: auto; flex: 1; }

.scene-item {
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid #12152a;
  border-left: 3px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.scene-item:hover { background: #12152a; }
.scene-item.sel { background: #15182e; border-left-color: #6366f1; }

.si-num { font-size: 11px; font-weight: 700; }
.si-loc { font-size: 11px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.si-time { font-size: 10px; color: #3d4266; margin-top: 1px; }
.si-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.si-dot { width: 7px; height: 7px; border-radius: 50%; opacity: 0.75; }

/* Col 2 — Breakdown */
.col-breakdown {
  width: 310px; flex-shrink: 0;
  background: #0c0e1c; border-right: 1px solid #181b2e;
  display: flex; flex-direction: column; overflow: hidden;
}
.breakdown-scroll { flex: 1; overflow-y: auto; }

.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.meta-item-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: #6366f1; margin-bottom: 3px;
}
.meta-input {
  width: 100%; background: #12152a; border: 1px solid #1e2235;
  border-radius: 5px; color: #e2e8f0; font-size: 11px; padding: 4px 8px;
}
.meta-input:focus { border-color: #6366f1; }
.aciklama-ta {
  width: 100%; height: 52px; background: #12152a; border: 1px solid #1e2235;
  border-radius: 5px; color: #94a3b8; font-size: 11px;
  padding: 5px 8px; resize: none; line-height: 1.5;
}
.aciklama-ta:focus { border-color: #6366f1; }
.meta-box { padding: 13px 16px; border-bottom: 1px solid #181b2e; }

.dept-section { border-bottom: 1px solid #12152a; }
.dept-header {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; cursor: pointer; user-select: none;
  transition: background 0.1s;
}
.dept-header:hover { background: #0f1120; }
.dept-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dept-name { flex: 1; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
.dept-badge { font-size: 10px; padding: 1px 7px; border-radius: 999px; font-weight: 600; }
.dept-chevron { font-size: 9px; color: #3d4266; margin-left: 2px; }

.dept-body { padding: 6px 16px 10px; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }

.tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 3px 9px 3px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent;
  transition: opacity 0.1s, outline 0.1s;
  user-select: none;
}
.tag .x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%; font-size: 11px;
  opacity: 0.5; transition: opacity 0.1s; line-height: 1;
}
.tag .x:hover { opacity: 1; }

.add-row { display: flex; gap: 6px; margin-top: 4px; }
.add-input-field {
  flex: 1; background: #12152a; border: 1px solid #252840;
  border-radius: 6px; color: #e2e8f0; font-size: 11px; padding: 5px 9px;
}
.add-input-field:focus { border-color: #6366f1; }
.add-confirm { font-size: 12px; padding: 4px 11px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
.btn-add-open {
  margin-top: 4px; padding: 4px 10px; width: 100%; text-align: left;
  background: transparent; border: 1px dashed #252840; border-radius: 6px;
  color: #3d4266; font-size: 11px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-add-open:hover { border-color: #3a3d5c; color: #6b7280; }

/* Col 3 — Screenplay */
.col-screenplay {
  flex: 1; overflow-y: auto; background: #0d0f1a; position: relative;
}
.legend-bar {
  padding: 7px 24px; border-bottom: 1px solid #181b2e;
  display: flex; flex-wrap: wrap; gap: 10px;
  position: sticky; top: 0; background: #0a0c16; z-index: 2;
}
.legend-item { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
.screenplay-text {
  padding: 28px 36px; font-size: 13px; line-height: 2;
  color: #c8d4e8; font-family: 'Courier New', monospace;
  white-space: pre-wrap; cursor: text; user-select: text; max-width: 760px;
}
.hl {
  border-radius: 3px; padding: 0 3px; cursor: pointer;
  border: 1px solid transparent; transition: outline 0.1s;
}
.screenplay-hint { padding: 4px 36px 28px; font-size: 10px; color: #1e2235; }

/* Popup */
.popup {
  position: fixed; background: #13162a; border: 1px solid #252840;
  border-radius: 9px; box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  overflow: hidden; z-index: 1000; min-width: 200px;
}
.popup-label { padding: 8px 14px; border-bottom: 1px solid #1e2235; font-size: 10px; color: #6b7280; }
.popup-scroll { max-height: 240px; overflow-y: auto; padding: 4px 0; }
.popup-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; cursor: pointer; font-size: 12px; color: #94a3b8;
  transition: background 0.08s;
}
.popup-row:hover { background: #1e2235; color: #e2e8f0; }
.popup-row-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Progress bar */
.progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: #6366f1;
  animation: progress-pulse 1.4s ease-in-out infinite;
}
@keyframes progress-pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useRef, useEffect } = React;
const h = React.createElement;

const DEPTS = [
  { key: "oyuncular",     label: "Oyuncular",      color: "#60a5fa", bg: "#0f2545" },
  { key: "yrd_oyuncular", label: "Yrd. Oyuncular", color: "#93c5fd", bg: "#0d1f3a" },
  { key: "sac",           label: "Saç",            color: "#fb923c", bg: "#2d1408" },
  { key: "makyaj",        label: "Makyaj",         color: "#f472b6", bg: "#2d0b20" },
  { key: "kostum",        label: "Kostüm",         color: "#c084fc", bg: "#1f0d3a" },
  { key: "sanat",         label: "Sanat",          color: "#4ade80", bg: "#052010" },
  { key: "araclar",       label: "Araçlar",        color: "#fbbf24", bg: "#231a00" },
  { key: "produksiyon",   label: "Prodüksiyon",    color: "#94a3b8", bg: "#141926" },
  { key: "teknik",        label: "Teknik",         color: "#22d3ee", bg: "#051c24" },
  { key: "cgi_vfx",       label: "CGI / VFX",      color: "#a78bfa", bg: "#19103a" },
  { key: "sfx",           label: "SFX",            color: "#fb923c", bg: "#2d1408" },
  { key: "sound_design",  label: "Sound Design",   color: "#34d399", bg: "#052018" },
  { key: "reji_notlar",   label: "Reji Notları",   color: "#f87171", bg: "#2d0808" },
];

const META_FIELDS = [
  { key: "sahne",  label: "SAHNE"  },
  { key: "bolum",  label: "BÖLÜM"  },
  { key: "gun",    label: "GÜN"    },
  { key: "zaman",  label: "ZAMAN"  },
  { key: "sayfa",  label: "SAYFA"  },
  { key: "mekan",  label: "MEKAN"  },
];

function splitScreenplay(text) {
  const lines = text.split("\n");
  const scenes = []; let cur = [];
  const re = /^\s*(?:\d+[\.\-]\s*|(?:İÇ|DIŞ|INT|EXT)[.\s/])/i;
  for (const line of lines) {
    if (re.test(line) && cur.length > 0) { scenes.push(cur.join("\n").trim()); cur = [line]; }
    else cur.push(line);
  }
  if (cur.length > 0) scenes.push(cur.join("\n").trim());
  return scenes.length ? scenes : [text];
}

function buildSegments(text, scene, activeItem) {
  if (!text || !scene) return [{ text }];
  const allItems = [];
  for (const d of DEPTS)
    for (const item of d.key in scene ? (scene[d.key] || []) : [])
      allItems.push({ item, deptKey: d.key, color: d.color, bg: d.bg });
  if (!allItems.length) return [{ text }];
  const sorted = [...allItems].sort((a, b) => b.item.length - a.item.length);
  let segs = [{ text, color: null }];
  for (const { item, deptKey, color, bg } of sorted) {
    const next = [];
    for (const seg of segs) {
      if (seg.color !== null) { next.push(seg); continue; }
      const parts = seg.text.split(item);
      if (parts.length === 1) { next.push(seg); continue; }
      for (let i = 0; i < parts.length; i++) {
        if (parts[i]) next.push({ text: parts[i], color: null });
        if (i < parts.length - 1) next.push({ text: item, color, bg, item, deptKey });
      }
    }
    segs = next;
  }
  return segs;
}

/* ---- Logo ---- */
function Logo() {
  return h("svg", { width: 24, height: 24, viewBox: "0 0 24 24", fill: "none" },
    h("rect", { width: 24, height: 24, rx: 7, fill: "#6366f1" }),
    h("circle", { cx: 12, cy: 12, r: 5.5, stroke: "#fff", strokeWidth: 2 }),
    h("circle", { cx: 12, cy: 12, r: 2.2, fill: "#fff" })
  );
}

/* ---- DeptSection ---- */
function DeptSection({ dept, items, activeItem, setActiveItem, onRemove, onAdd }) {
  const [open, setOpen] = useState(true);
  const [adding, setAdding] = useState(false);
  const [val, setVal] = useState("");

  function submit() {
    if (val.trim()) { onAdd(val.trim()); setVal(""); setAdding(false); }
  }

  return h("div", { className: "dept-section" },
    h("div", { className: "dept-header", onClick: () => setOpen(o => !o) },
      h("div", { className: "dept-dot", style: { background: dept.color } }),
      h("span", { className: "dept-name", style: { color: dept.color } }, dept.label),
      items.length > 0
        ? h("span", { className: "dept-badge", style: { background: dept.bg, color: dept.color } }, items.length)
        : null,
      h("span", { className: "dept-chevron" }, open ? "▴" : "▾")
    ),
    open ? h("div", { className: "dept-body" },
      items.length > 0
        ? h("div", { className: "tags-wrap" },
          items.map((item, i) => {
            const active = !!(activeItem && activeItem.item === item && activeItem.deptKey === dept.key);
            return h("span", {
              key: i, className: "tag",
              style: {
                background: active ? dept.color + "28" : dept.bg,
                color: dept.color,
                borderColor: dept.color + (active ? "70" : "25"),
                outline: active ? "2px solid " + dept.color + "40" : "none",
              },
              onClick: () => setActiveItem(a =>
                a && a.item === item && a.deptKey === dept.key ? null : { item, deptKey: dept.key }
              )
            },
              item,
              h("span", { className: "x", onClick: e => { e.stopPropagation(); onRemove(item); } }, "×")
            );
          })
        ) : null,
      adding
        ? h("div", { className: "add-row" },
          h("input", {
            autoFocus: true, className: "add-input-field",
            placeholder: "Ekle → Enter", value: val,
            onChange: e => setVal(e.target.value),
            onKeyDown: e => { if (e.key === "Enter") submit(); if (e.key === "Escape") { setAdding(false); setVal(""); } }
          }),
          h("button", {
            className: "add-confirm",
            style: { background: dept.bg, borderColor: dept.color + "50", color: dept.color },
            onClick: submit
          }, "+")
        )
        : h("button", { className: "btn-add-open", onClick: () => setAdding(true) }, "+ ekle")
    ) : null
  );
}

/* ---- App ---- */
function App() {
  const [screen,    setScreen]    = useState("input");
  const [screenplay,setScreenplay]= useState("");
  const [anacast,   setAnacast]   = useState("");
  const [loading,   setLoading]   = useState(false);
  const [progress,  setProgress]  = useState("");
  const [scenes,    setScenes]    = useState([]);
  const [selIdx,    setSelIdx]    = useState(0);
  const [activeItem,setActiveItem]= useState(null);
  const [popup,     setPopup]     = useState(null);
  const [error,     setError]     = useState("");
  const activeRef = useRef(null);

  useEffect(() => {
    if (activeRef.current) activeRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
  }, [activeItem]);

  const scene = scenes[selIdx] || null;

  /* ---- Streaming fetch ---- */
  async function runBreakdown() {
    if (!screenplay.trim()) return;
    setLoading(true); setError(""); setProgress("Bağlanıyor...");
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 115000);
    try {
      const res = await fetch("/breakdown", {
        method: "POST", signal: ctrl.signal,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ senaryo: screenplay.trim(), anacast: anacast.trim() })
      });
      clearTimeout(tid);
      if (!res.ok) { const t = await res.text(); throw new Error("HTTP " + res.status + ": " + t.slice(0, 200)); }

      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "", chars = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split("\n"); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data:")) continue;
          let evt; try { evt = JSON.parse(line.slice(5).trim()); } catch { continue; }
          if (evt.error) throw new Error(evt.error);
          if (evt.chunk) { chars += evt.chunk.length; setProgress("Analiz ediliyor… " + chars + " karakter"); }
          if (evt.done && evt.result) {
            const raw = splitScreenplay(screenplay);
            const merged = (evt.result.scenes || []).map((sc, i) => ({
              ...sc, screenplay_text: raw[i] || raw[Math.min(i, raw.length - 1)] || ""
            }));
            setScenes(merged); setSelIdx(0); setActiveItem(null); setScreen("viewer");
          }
        }
      }
    } catch (e) { setError(e.message || String(e)); }
    finally { setLoading(false); setProgress(""); }
  }

  /* ---- Highlight / popup ---- */
  function handleMouseUp() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) { setPopup(null); return; }
    const text = sel.toString().trim();
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    setPopup({ text, x: rect.left + rect.width / 2, y: rect.top });
  }

  function assignToDept(deptKey) {
    if (!popup) return;
    setScenes(prev => prev.map((sc, i) => {
      if (i !== selIdx) return sc;
      const ex = sc[deptKey] || [];
      if (ex.includes(popup.text)) return sc;
      return { ...sc, [deptKey]: [...ex, popup.text] };
    }));
    setPopup(null); window.getSelection()?.removeAllRanges();
  }

  function removeItem(deptKey, item) {
    setScenes(prev => prev.map((sc, i) =>
      i !== selIdx ? sc : { ...sc, [deptKey]: (sc[deptKey] || []).filter(x => x !== item) }
    ));
    if (activeItem && activeItem.item === item) setActiveItem(null);
  }

  function addItem(deptKey, val) {
    setScenes(prev => prev.map((sc, i) => {
      if (i !== selIdx) return sc;
      const ex = sc[deptKey] || [];
      if (ex.includes(val)) return sc;
      return { ...sc, [deptKey]: [...ex, val] };
    }));
  }

  function updateMeta(key, val) {
    setScenes(prev => prev.map((sc, i) => i !== selIdx ? sc : { ...sc, [key]: val }));
  }

  /* ======== INPUT SCREEN ======== */
  if (screen === "input") return (
    h("div", { className: "app" },
      h("div", { className: "topbar" },
        h(Logo, null),
        h("span", { className: "topbar-title" }, "CerenSafe"),
        h("span", { className: "topbar-sub" }, "Breakdown Studio")
      ),
      h("div", { className: "input-screen" },
        /* Sidebar */
        h("div", { className: "input-sidebar" },
          h("div", null,
            h("label", { className: "field-label" }, "AnaCast Listesi"),
            h("textarea", {
              className: "textarea-base anacast-ta",
              value: anacast, onChange: e => setAnacast(e.target.value),
              placeholder: "ALİ\nMERYEM\nHALİL"
            })
          ),
          h("button", {
            className: "btn-primary",
            onClick: runBreakdown,
            disabled: loading || !screenplay.trim(),
            style: { position: "relative" }
          },
            loading ? (progress || "Analiz ediliyor...") : "Breakdown Al",
            loading ? h("div", { className: "progress-bar" }) : null
          ),
          error ? h("div", { className: "error-box" }, error) : null,
          h("div", null,
            h("div", { style: { fontSize: 10, fontWeight: 700, letterSpacing: "0.07em",
              textTransform: "uppercase", color: "#3d4266", marginBottom: 8 } }, "Departmanlar"),
            h("div", { className: "dept-pills" },
              DEPTS.map(d => h("span", { key: d.key, className: "dept-pill-mini",
                style: { background: d.bg, color: d.color, borderColor: d.color + "30" } }, d.label))
            )
          )
        ),
        /* Main: screenplay textarea */
        h("div", { className: "input-main" },
          h("label", { className: "field-label" }, "Senaryo"),
          h("textarea", {
            className: "textarea-base screenplay-ta",
            value: screenplay, onChange: e => setScreenplay(e.target.value),
            placeholder: "1. İÇ/GECE — KAHVE\n\nALİ masaya oturur.\n\n2. DIŞ/GÜN — SOKAK\n\nMERYEM döner..."
          })
        )
      )
    )
  );

  /* ======== VIEWER SCREEN ======== */
  const segs = scene ? buildSegments(scene.screenplay_text || "", scene, activeItem) : [];
  const activeDepts = scene ? DEPTS.filter(d => (scene[d.key] || []).length > 0) : [];

  return (
    h("div", { className: "app", onClick: () => setPopup(null) },

      /* Topbar */
      h("div", { className: "topbar" },
        h(Logo, null),
        h("span", { className: "topbar-title" }, "CerenSafe"),
        h("div", { className: "topbar-divider" }),
        h("span", { className: "topbar-count" }, scenes.length + " sahne"),
        h("div", { className: "topbar-actions" },
          h("button", { className: "btn-ghost",
            onClick: () => { setScreen("input"); setScenes([]); setActiveItem(null); }
          }, "← Yeni Senaryo")
        )
      ),

      /* Body */
      h("div", { className: "viewer-body" },

        /* COL 1 — Scenes */
        h("div", { className: "col-scenes" },
          h("div", { className: "col-header" }, "Sahneler"),
          h("div", { className: "scenes-list" },
            scenes.map((sc, i) => {
              const dots = DEPTS.filter(d => (sc[d.key] || []).length > 0);
              return h("div", {
                key: i,
                className: "scene-item" + (i === selIdx ? " sel" : ""),
                onClick: () => { setSelIdx(i); setActiveItem(null); setPopup(null); }
              },
                h("div", { className: "si-num",
                  style: { color: i === selIdx ? "#a5b4fc" : "#6366f1" } },
                  "S" + (sc.sahne || i + 1)
                ),
                h("div", { className: "si-loc",
                  style: { color: i === selIdx ? "#e2e8f0" : "#94a3b8" } },
                  sc.mekan || "—"
                ),
                h("div", { className: "si-time" },
                  [sc.zaman, sc.gun ? "Gün " + sc.gun : ""].filter(Boolean).join(" · ") || "—"
                ),
                dots.length > 0
                  ? h("div", { className: "si-dots" },
                    dots.slice(0, 9).map(d => h("div", { key: d.key, className: "si-dot", style: { background: d.color } }))
                  ) : null
              );
            })
          )
        ),

        /* COL 2 — Breakdown */
        h("div", { className: "col-breakdown" },
          h("div", { className: "col-header" }, "Breakdown"),
          h("div", { className: "breakdown-scroll" },
            scene ? [
              /* Meta */
              h("div", { key: "meta", className: "meta-box" },
                h("div", { className: "meta-grid" },
                  META_FIELDS.map(f => h("div", { key: f.key },
                    h("div", { className: "meta-item-label" }, f.label),
                    h("input", { className: "meta-input", value: scene[f.key] || "",
                      onChange: e => updateMeta(f.key, e.target.value) })
                  ))
                ),
                h("div", { className: "meta-item-label", style: { marginBottom: 3 } }, "AÇIKLAMA"),
                h("textarea", { className: "aciklama-ta", value: scene.aciklama || "",
                  onChange: e => updateMeta("aciklama", e.target.value) })
              ),
              /* Depts */
              ...DEPTS.map(dept => h(DeptSection, {
                key: dept.key, dept,
                items: scene[dept.key] || [],
                activeItem, setActiveItem,
                onRemove: item => removeItem(dept.key, item),
                onAdd: val => addItem(dept.key, val)
              }))
            ] : null
          )
        ),

        /* COL 3 — Screenplay */
        h("div", { className: "col-screenplay", onMouseUp: handleMouseUp },
          /* Legend */
          activeDepts.length > 0
            ? h("div", { className: "legend-bar" },
              activeDepts.map(d => h("span", { key: d.key, className: "legend-item", style: { color: d.color } },
                h("span", { className: "legend-dot", style: { background: d.color } }),
                d.label
              ))
            ) : null,

          /* Text */
          h("div", { className: "screenplay-text" },
            segs.map((seg, i) => {
              if (!seg.color) return h("span", { key: i }, seg.text);
              const active = !!(activeItem && activeItem.item === seg.item && activeItem.deptKey === seg.deptKey);
              return h("span", {
                key: i, ref: active ? activeRef : null,
                className: "hl",
                style: {
                  background: active ? seg.color + "35" : seg.bg,
                  color: seg.color,
                  borderColor: seg.color + (active ? "70" : "20"),
                  outline: active ? "2px solid " + seg.color + "45" : "none",
                },
                onClick: e => {
                  e.stopPropagation();
                  setActiveItem(a =>
                    a && a.item === seg.item && a.deptKey === seg.deptKey ? null : { item: seg.item, deptKey: seg.deptKey }
                  );
                }
              }, seg.text);
            })
          ),
          h("div", { className: "screenplay-hint" },
            "Metni seç → departman ata  ·  Tag veya highlight tıkla → vurgula  ·  × ile kaldır"
          ),

          /* Popup */
          popup ? h("div", {
            className: "popup",
            onClick: e => e.stopPropagation(),
            style: {
              left: Math.max(10, Math.min(popup.x - 100, window.innerWidth - 220)),
              top:  Math.max(10, popup.y - 210)
            }
          },
            h("div", { className: "popup-label" },
              '"' + (popup.text.length > 30 ? popup.text.slice(0, 30) + "…" : popup.text) + '"'
            ),
            h("div", { className: "popup-scroll" },
              DEPTS.map(d => h("div", { key: d.key, className: "popup-row", onClick: () => assignToDept(d.key) },
                h("span", { className: "popup-row-dot", style: { background: d.color } }),
                d.label
              ))
            )
          ) : null
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
